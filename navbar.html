<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
</head>
<style>
:root {
  --primary-blue: #2563eb;
  --navy: #0f1f5c;
  --gray-600: #64748b;
}
.navbar {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  box-shadow: 0 1px 30px rgba(0, 0, 0, 0.1);
  transition: all 0.3s ease;
  padding: 1rem 1.5rem;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  z-index: 1000;
}
.navbar-brand {
  font-weight: 700;
  font-size: clamp(1.2rem, 2vw, 1.8rem);
  color: var(--primary-blue) !important;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.nav-link {
  font-weight: 600;
  font-size: clamp(0.9rem, 1.2vw, 1rem);
  color: var(--gray-600) !important;
  position: relative;
  transition: all 0.3s ease;
  padding: 4px 6px;
  text-decoration: none;
}
.nav-link:hover { color: var(--primary-blue) !important; transform: translateY(-2px); }
.nav-link::after {
  content: '';
  position: absolute;
  width: 0; height: 2px;
  bottom: -5px; left: 50%;
  background: var(--primary-blue);
  transition: all 0.3s ease;
  transform: translateX(-50%);
}
.nav-link:hover::after { width: 100%; }
.nav-link.active { color: var(--primary-blue) !important; }
.nav-link.active::after { width: 100%; }
.collapse { margin-right: 0 !important; }

/* member button */
.btn-member {
  background: linear-gradient(90deg, var(--navy), var(--primary-blue));
  color: #fff !important;
  border-radius: 25px;
  padding: .45rem 1.1rem !important;
  font-weight: 700 !important;
  font-size: .85rem !important;
  transition: opacity .2s, transform .1s;
  text-decoration: none;
  white-space: nowrap;
}
.btn-member:hover { opacity: .9; transform: translateY(-1px); }
.btn-member::after { display: none !important; }

/* user pill */
.user-pill {
  display: flex;
  align-items: center;
  gap: .45rem;
  background: #eff6ff;
  border: 1.5px solid #bfdbfe;
  border-radius: 25px;
  padding: .3rem .9rem .3rem .45rem;
  font-size: .82rem;
  font-weight: 600;
  color: var(--primary-blue);
  cursor: pointer;
  text-decoration: none;
}
.user-pill .avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--primary-blue));
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 800;
}
@media (max-width: 425px){ .nav-link { font-size: .9rem; padding: 6px 0; } }
@media (max-width: 768px){ .nav-link { font-size: .9rem; padding: 6px 0; } }
@media (max-width: 375px){ .navbar-brand { font-size: 1.1rem; } .nav-link { font-size: .9rem; } }
@media (max-width: 320px){ .navbar-brand { font-size: 1rem; } .nav-link { font-size: .85rem; } }
</style>
<body>
<nav class="navbar navbar-expand-lg navbar-light fixed-top">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
      <i class="fas fa-globe me-2"></i> World Connect Leads
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-lg-auto text-start align-items-lg-center" style="gap:1.5rem;">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
        <li class="nav-item"><a class="nav-link" href="whoWe.html">Who We Are</a></li>
        <li class="nav-item"><a class="nav-link" href="samples.html">Samples</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <!-- dynamic auth area -->
        <li class="nav-item" id="navAuthArea">
          <a class="btn-member" href="login.html"><i class="fas fa-user me-1"></i> Member Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<script>
  // Always show login button (remove dashboard auto link)
  try {
    document.getElementById('navAuthArea').innerHTML = `
      <a class="btn-member" href="login.html">
        <i class="fas fa-user me-1"></i> Member Login
      </a>
    `;
  } catch(e) {}

  // set active link
  try {
    const path = window.location.pathname.split('/').pop() || 'index.html';

    document.querySelectorAll('.nav-link').forEach(link => {
      const href = link.getAttribute('href')?.split('/').pop();

      if (href === path || (path === '' && href === 'index.html')) {
        link.classList.add('active');
      }
    });

  } catch(e) {}
</script>
</body>
</html>
